version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nurse_app
      POSTGRES_PASSWORD: nurse_app_dev
      POSTGRES_DB: nurse_logging
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurse_app -d nurse_logging"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    environment:
      DATABASE_URL: postgresql://nurse_app:nurse_app_dev@db:5432/nurse_logging
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: "3030"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
